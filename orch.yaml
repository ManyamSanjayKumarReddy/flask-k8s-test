apiVersion: v1
kind: Deployment

metadata:
  name: flask-demo-app
  namespace: demo

spec:
  repoUrl: https://github.com/ManyamSanjayKumarReddy/flask-k8s-test
  tag: latest
  replicas: 1
  cpu: 1
  memory: 512
  port: 8000

  labels:
    app: flask-app

  probes:
    liveness:
      type: http
      path: /health
      port: 8000

cicd:
  branch: main
  event: push
  webhookSecret: demo-app-secret-123