apiVersion: v1
kind: Deployment

metadata:
  name: flask-demo-application-1.3
  namespace: demo

spec:
  repoUrl: https://github.com/ManyamSanjayKumarReddy/flask-k8s-test
  tag: latest
  replicas: 1
  cpu: 1
  memory: 512
  port: 8000

  labels:
    app: flask-app

  probes:
    liveness:
      type: http
      path: /health
      port: 8000

  service:
    name: flask-demo-2

  ingress:
    name: flask-demo-ingress-2
    host: chat.theskilledguru.com
    path: /
    tls: true

cicd:
  branch: main
  event: push
  webhookSecret: demo-app-secret-123